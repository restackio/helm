{{- if and .Values.observability.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "restack.fullname" . }}-prometheus
  labels:
    {{- include "restack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.observability.prometheus.config.scrape_interval | default "15s" }}
      evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
    
    alerting:
      alertmanagers:
      {{- if .Values.observability.alertmanager.enabled }}
      - static_configs:
        - targets:
          - {{ include "restack.fullname" . }}-alertmanager:{{ .Values.observability.alertmanager.service.port | default 9093 }}
      {{- end }}

    rule_files:
      # - "first_rules.yml"
      # - "second_rules.yml"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:{{ .Values.observability.prometheus.port | default 9090 }}']

      - job_name: 'kubernetes-pods-otel-sidecar'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only discover pods belonging to this Helm release
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_app_kubernetes_io_instance]
            action: keep
            regex: ^{{ include "restack.name" . }};^{{ .Release.Name }}$
          # Check if the pod has the otel-collector container and its 'metrics' port (8889)
          - source_labels: [__meta_kubernetes_pod_container_name, __meta_kubernetes_pod_container_port_name]
            action: keep
            regex: ^otel-collector$;^metrics$
          # Relabel address to use the pod IP and the container's 'metrics' port
          - source_labels: [__address__, __meta_kubernetes_pod_container_port_number]
            action: replace
            regex: ([^:]+)(?::\\d+)?;(\\d+)
            replacement: $1:$2
            target_label: __address__
          # Add namespace and pod name as labels to the metrics
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Drop Istio proxy metrics, if Istio is present and metrics are exposed on otel-collector (unlikely for this port)
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: drop
            regex: istio-proxy
{{- end }} 