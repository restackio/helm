image:
  repository: ""
  tag: latest
  pullPolicy: Always

livenessProbe:
  enabled: false
# initialDelaySeconds: 10
# periodSeconds: 10
# timeoutSeconds: 1
# successThreshold: 1
# failureThreshold: 3

readinessProbe:
  enabled: false

resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 1Gi

backend:
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 100
    averageUtilization:
      cpu: 80
      memory: 80

pipeline:
  image:
    repository:
    tag: latest
    pullPolicy: Always

  terminationGracePeriodSeconds: 600

  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 20
    averageUtilization:
      cpu: 75
      memory: 75

  resources:
    limits:
      cpu: 50m
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 1Gi

# Engine deployments

engine:
  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 1Gi

stream:
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    averageUtilization:
      cpu: 80
      memory: 80

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 125m
      memory: 256Mi

operator:
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    averageUtilization:
      cpu: 80
      memory: 80

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 125m
      memory: 256Mi

logs:
  enabled: false
  gcp:
    bucket:
  aws:
    bucket:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

envs: []
secrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP

ingress:
  hosts:
    []
    # - host: restack_hostname
  enabled: true
  annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

vpa:
  enabled: false
  updateMode: "Auto"
  minAllowed:
    cpu: 25m
    memory: 64Mi
  maxAllowed:
    cpu: 100m
    memory: 256Mi

resourceQuota:
  enabled: false
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi

# OpenTelemetry sidecar configuration
opentelemetry:
  sidecar:
    enabled: true # Set to true to enable the otel-collector sidecar
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.88.0 # Pin to a specific version (example, check for latest)
      pullPolicy: IfNotPresent

    env: # General environment variables for the sidecar itself if needed, though most config is now in the ConfigMap
      # Example: OTEL_EXPORTER_OTLP_ENDPOINT is now primarily driven by the ConfigMap logic
      # but you might still need it if your app inside the pod talks to localhost:4318,
      # and the sidecar needs to know where *that* (external) endpoint is.
      # This value will be used by the ConfigMap template.
      otelExporterOtlpEndpoint: "http://localhost:4317" # Default for generic, adjust per exporter needs in ConfigMap
      otelExporterOtlpInsecure: true # Example, if using generic OTLP with insecure TLS

    # Exporter type: "aws", "gcp", or "other" (for generic OTLP)
    # This controls which exporter configuration is rendered in the otel-collector-configmap.yaml
    exporter: "other"

    aws: # Configuration for AWS (used if exporter is "aws")
      region: "us-east-1"
      # The otelExporterOtlpEndpoint above should be your AMP OTLP endpoint or Prometheus remote write endpoint

    gcp: # Configuration for GCP (used if exporter is "gcp")
      projectId: "your-gcp-project-id"
      # For GCP, the otelExporterOtlpEndpoint is typically not set directly if using googlecloudprometheus exporter

    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

# Local observability stack (Prometheus, Grafana, Alertmanager)
observability:
  enabled: false # Set to true to deploy Prometheus, Grafana, Alertmanager

  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: v2.47.2 # Pin to a specific version
      pullPolicy: IfNotPresent
    port: 9090
    replicaCount: 1
    podSecurityContext: {}
    # fsGroup: 65534
    # runAsUser: 65534
    # runAsNonRoot: true
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    config:
      scrape_interval: "15s"
    service:
      type: ClusterIP
      port: 9090
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 8Gi
      retentionTime: "15d"
      # storageClassName: ""
    rbac:
      create: true
    nodeSelector: {}
    affinity: {}
    tolerations: []

  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: 10.1.5 # Pin to a specific version
      pullPolicy: IfNotPresent
    port: 3000
    replicaCount: 1
    adminUser: admin
    adminPassword: "CHANGE_ME_PLEASE" # !!! IMPORTANT: Change this in your actual values file or via --set !!!
    podSecurityContext: {}
    # fsGroup: 472
    # runAsUser: 472
    # runAsNonRoot: true
    resources:
      limits:
        cpu: 300m
        memory: 256Mi
      requests:
        cpu: 150m
        memory: 128Mi
    service:
      type: ClusterIP # For Minikube, you might use NodePort or LoadBalancer
      port: 3000
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 2Gi
      # storageClassName: ""
    nodeSelector: {}
    affinity: {}
    tolerations: []

  alertmanager:
    enabled: false
    image:
      repository: prom/alertmanager
      tag: v0.26.0 # Pin to a specific version
      pullPolicy: IfNotPresent
    port: 9093
    replicaCount: 1
    podSecurityContext: {}
    # fsGroup: 65534
    # runAsUser: 65534
    # runAsNonRoot: true
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi
    config: {}
    service:
      type: ClusterIP
      port: 9093
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      # storageClassName: ""
    nodeSelector: {}
    affinity: {}
    tolerations: []
